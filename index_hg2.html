<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chams Bac Assistant</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=wand_stars" />
    <style>
        body { background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: stretch; height: 100vh; margin: 0; }
        .card { font-family: 'Segoe UI', sans-serif; background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; margin: 30px;}
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; }
        button { background: #f0062d; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #770320; }
        #result { margin-top: 20px; min-height: 80px; width: 50%; padding: 15px; background: #0f3460; border-radius: 8px; font-style: italic; display: flex; align-items: center; justify-content: center; margin: auto; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #e94560; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Histoire-Géographie</h2>

    <select id="serie">
        <option value="série littéraire">Littéraire</option>
        <option value="série scientifique">Scientifique</option>
        <option value="niveau débutant">Niveau débutant</option>
        <option value="niveau intermédiaire">Niveau intermédiaire</option>
        <option value="niveau avancé">Niveau avancé</option>
        <option value="niveau impossible">Niveau impossible</option>
    </select>
    
    <select id="type">
        <option value="une Résumé complet">Résumé complet</option>
        <option value="Les points clés">Points clés</option>
        <option value="un Plan détaillé d'une dissertation">Problème corrigé</option>
    </select>

    <select id="theme">
        <option value="Les bilans de la deuxième guerre mondiale">Bilan de la deuxième guerre mondiale</option>
        <option value="La formation des blocs et l'évolution de la guerre froide (1947 à 1962)">Guerre froide (1947 à 1962)</option>
        <option value="La détente (1962 à 1975)">Détente (1962 à 1975)</option>
        <option value="le monde en crise (1975 à 1985)">Le monde en crise (1975 à 1985)</option>
        <option value="La nouvelle détente depuis 1985">Nouvelle détente depuis 1985</option>
        <option value="La décolonisation">Décolonisation</option>
        <option value="L'apparition du tiers monde sur la scene internationale">Tiers monde</option>
        <option value="La marche vers l'indépendence de Madagascar">La marche vers l'indépendence de Madagascar</option>
        <option value="Les institution des républiques successives">Les institution des républiques successives</option>
        <option value="L'économie malgache depuis 1945">L'économie malgache depuis 1945</option>
        <option value="Le nouvel ordre mondial">Nouvel ordre mondial</option>
        <option value="Les Contrastes entre le Nordet le Sud">Contrastes entre le Nordet le Sud</option>
        <option value="Les rapports et les échanges mondiaux">Rapports et les échanges mondiaux</option>
        <option value="La mondialisation">La mondialisation</option>
        <option value="La triade: les grands centres mondiaux de puissance">Triade</option>
        <option value="Les Etas-Unis d'Amérique">Les Etas-Unis d'Amérique</option>
        <option value="L'Union Européenne">L'Union Européenne</option>
        <option value="Le japon">Le Japon</option>
        <option value="Madagascar, un pays en voie de développement">Madagascar, un pays en voie de développement</option>
    </select>

    <button onclick="generateChallenge()" id="btn"><span class="material-symbols-outlined">wand_stars</span></button>
    <a href="index_0.html"><button><span class="material-symbols-outlined">home</span></button></a>
 
</div>
<div id="result">
    <span id="text">Choisissez vos options...</span>
    <div class="loader" id="loader"></div>
</div>

<script>
    const apiKey = prompt("Entrez votre clé API groq : ");
    async function generateChallenge() {
        // 🔑 Remplacez par votre clé API Groq (sk_...)
       
        const type = document.getElementById('type').value;
        const theme = document.getElementById('theme').value;
        const serie = document.getElementById('serie').value;
        const textElement = document.getElementById('text');
        const loader = document.getElementById('loader');

        textElement.innerText = "";
        loader.style.display = "block";

        const prompt = `Génère ${type} concernant ${theme} pour un élève de terminale qui veut s'entrainer pour son bac ${serie} Malgache. 
                        Soit comme un vrai prof d'Histoire-Géographie. Réponds uniquement avec ${type} en français et bien respecter s'il s'agit d'un thème d'histoire ou de géographie, sans y mettre de commentaire.`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    // Modèle ultra-rapide de Meta via Groq
                    model: "llama-3.3-70b-versatile", 
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.8
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error.message);
            }

            const data = await response.json();
            textElement.innerText = data.choices[0].message.content;

        } catch (error) {
            textElement.innerText = "Erreur Groq : " + error.message;
            console.error("Détails :", error);
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
