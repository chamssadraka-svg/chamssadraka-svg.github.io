<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chams Bac Assistant</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=wand_stars" />
    <style>
        body { background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: stretch; height: 100vh; margin: 0; }
        .card { font-family: 'Segoe UI', sans-serif; background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; margin: 30px;}
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; }
        button { background: #f0062d; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #770320; }
        #result { margin-top: 20px; min-height: 80px; width: 50%; padding: 15px; background: #0f3460; border-radius: 8px; font-style: italic; display: flex; align-items: center; justify-content: center; margin: auto;}
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #e94560; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Anglais</h2>

    <select id="serie">
        <option value="littéraire">Littéraire</option>
        <option value="scientifique">Scientifique</option>
    </select>
    
    <select id="type">
        <option value="a full summary">Full summary</option>
        <option value="the key points">Key points</option>
        <option value="a corrected topic">Corrected topic</option>
    </select>

    <select id="theme">
        <option value="Opinion and argument">Opinion and argument</option>
        <option value="Education">Education</option>
        <option value="Families">Families</option>
        <option value="Daily routine">Daily routine</option>
        <option value="People at work">People at work</option>
        <option value="More scientific discoveries">More scientific discoveries</option>
        <option value="Outside world">Outside world</option>
        <option value="Protecting the environment">Protecting the environment</option>
        <option value="Complaining">Complaining</option>
        <option value="Wishes and regret">Wishes and regret</option>
        <option value="Health">Health</option>
        <option value="Sport, game and leisure">Sport, game and leisure</option>
        <option value="Request and invitation">Request and invitation</option>
        <option value="Narrating social events">Narrating social events</option>
        <option value="Social and cultural life">Social and cultural life</option>
    </select>

    <button onclick="generateChallenge()" id="btn"><span class="material-symbols-outlined">wand_stars</span></button>
    <a href="index_0.html"><button><span class="material-symbols-outlined">home</span></button></a>
 
</div>
<div id="result">
    <span id="text">Choisissez vos options...</span>
    <div class="loader" id="loader"></div>
</div>

<script>
    const apiKey = prompt("Entrez votre API groq: ");
    async function generateChallenge() {
        // 🔑 Remplacez par votre clé API Groq (sk_...)
        
        const type = document.getElementById('type').value;
        const theme = document.getElementById('theme').value;
        const serie = document.getElementById('serie').value;
        const textElement = document.getElementById('text');
        const loader = document.getElementById('loader');

        textElement.innerText = "";
        loader.style.display = "block";

        const prompt = `generate ${type} for chapter ${theme} for a review of Malagasy-style English (aquivalent to a Malagasy baccalaureate exam).
                        Act like an English teacher. Answer only with the topic in English, without commentary`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    // Modèle ultra-rapide de Meta via Groq
                    model: "llama-3.3-70b-versatile", 
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.8
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error.message);
            }

            const data = await response.json();
            textElement.innerText = data.choices[0].message.content;

        } catch (error) {
            textElement.innerText = "Erreur Groq : " + error.message;
            console.error("Détails :", error);
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
