
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chams Bac Assistant</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />

    <style>
        body { background: #1a1a2e; color: white; display: flex; justify-content: space-around; align-items: stretch; height: 100vh; margin: 0; }

        .card { background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; margin: 30px;}

        h2 {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            resize: none;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        button {
            width: 30%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #e40505;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        button:hover {
            background: #740303;
        }

        #result { margin-top: 20px; min-height: 80px; width: 50%; padding: 15px; background: #0f3460; border-radius: 8px; font-style: italic; display: flex; align-items: center; justify-content: center; margin: auto;}
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #e94560; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="card">

    <h2>Chams Bac Assistant</h2>

    <textarea
        id="prompt"
        placeholder= "Pose une question à Chams Bac Assistant..."
    ></textarea>

    <button onclick="askAI()">
        Envoyer
    </button>
    <a href="index_0.html"><button><span class="material-symbols-outlined">home</span></button></a>
 
</div>

<div id="result">
    <span id="response">Comment puis-je vous aider ?</span>
    <div class="loader" id="loader"></div>
</div>



<script>

const apiKey = prompt("Entrez votre clé API groq : ");

async function askAI() {

    // 🔑 Mets ta clé OpenRouter ici
    
    const prompt =
        document.getElementById('prompt').value;

    const responseBox =
        document.getElementById('response');

    const loader =
        document.getElementById('loader');

    if (!prompt.trim()) {

        responseBox.innerText =
            "Écris un message.";

        return;
    }

    responseBox.innerText = "";

    loader.style.display = "block";

    try {

        const response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`,
                    "HTTP-Referer": "http://localhost:8000",
                    "X-Title": "Agent IA"
                },

                body: JSON.stringify({

                    // 🔥 Modèle IA
                    model: "llama-3.3-70b-versatile",

                    messages: [
                        {
                            role: "system",
                            content: `
Ton nom est Chams Bac Assistant.
Tu es un agent IA ultra intelligent.
Tu aides les étudiants en terminale.
Tu es précis, rapide, instructif et créatif.
`
                        },
                        {
                            role: "user",
                            content: prompt
                        }
                    ],

                    temperature: 0.9,
                    max_tokens: 700
                })
            }
        );

        const data = await response.json();

        console.log(data);

        if (!response.ok) {

            throw new Error(
                data.error?.message ||
                "Erreur API"
            );
        }

        responseBox.innerText =
            data.choices[0].message.content;

    } catch (error) {

        console.error(error);

        responseBox.innerText =
            "Erreur : " + error.message;

    } finally {

        loader.style.display = "none";
    }
}
    prompt.innerText = "";

</script>

</body>
</html>
