<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chams Bac Assistant</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=wand_stars" />
    <style>
        body { background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: stretch; height: 100vh; margin: 0; }
        .card { font-family: 'Segoe UI', sans-serif; background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; margin: 30px;}
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; }
        button { background: #f0062d; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #770320; }
        #result { margin-top: 20px; min-height: 80px; width: 50%; padding: 15px; background: #0f3460; border-radius: 8px; font-style: italic; display: flex; align-items: center; justify-content: center; margin: auto;}
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #e94560; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Français</h2>

    <select id="serie">
        <option value="série littéraire">Littéraire</option>
        <option value="série scientifique">Scientifique</option>
        <option value="niveau débutant">Niveau débutant</option>
        <option value="niveau intermédiaire">Niveau intermédiaire</option>
        <option value="niveau avancé">Niveau avancé</option>
        <option value="niveau impossible">Niveau impossible</option>
    </select>
    
    <select id="type">
        <option value="Dissertation">Dissertation</option>
        <option value="Questions de lexique et morphosyntaxe">Questions de lexique et morphosyntaxe</option>
        <option value="Compréhension et résumé d'un texte ou d'un extrait de texte(le texte en question doit être compris dans le sujet)">Résumé</option>
    </select>

    <select id="theme">
        <option value="au hasard">Exercice au hasard</option>
        <option value="Les objestifs et les projets de lecture">Objestifs et les projets de lecture</option>
        <option value="Les stratégie de lecture">Stratégie de lecture</option>
        <option value="La fiche de lecture">Fiche de lecture</option>
        <option value="La lexique">La lexique</option>
        <option value="La morphosyntaxe">La morphosyntaxe</option>
        <option value="Les outils discursifs">Outils discursifs</option>
        <option value="La Présentation et rédaction un commentaire">Présentation et rédaction un commentaire</option>
        <option value="Les techniques de résumé">Techniques de résumé</option>
        <option value="la Présentation d'un éxposer">Présentation d'un éxposer</option>
        <option value="La participation à un débat">Participation à un débat</option>
        <option value="la Méthodologie sur les éxpressions écrite">Méthodologie sur les éxpressions écrite</option>
        <option value="La Méthodologie de la dissertation">Méthodologie de la dissertation</option>
    </select>

    <button onclick="generateChallenge()" id="btn"><span class="material-symbols-outlined">wand_stars</span></button>
    <button onclick= "corriger()" >Correction</button>
    <a href="index_0.html"><button><span class="material-symbols-outlined">home</span></button></a>
 
</div>
<div id="result">
    <span id="text">Choisissez vos options...</span>
    <div class="loader" id="loader"></div>
</div>

<script>
    const apiKey = prompt("Entrez votre clé API groq : ");
    async function generateChallenge() {
        // 🔑 Remplacez par votre clé API Groq (sk_...)
       
        const type = document.getElementById('type').value;
        const theme = document.getElementById('theme').value;
        const serie = document.getElementById('serie').value;
        const textElement = document.getElementById('text');
        const loader = document.getElementById('loader');

        textElement.innerText = "";
        loader.style.display = "block";

        const prompt = `Génère une ${type} pour le chapitre ${theme} pour une exercice de français de type bac ${serie} Malgache. 
                        Soit comme un prof de français. Réponds uniquement avec le sujet à traiter en français, sans commentaire.`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    // Modèle ultra-rapide de Meta via Groq
                    model: "llama-3.3-70b-versatile", 
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.8
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error.message);
            }

            const data = await response.json();
            textElement.innerText = data.choices[0].message.content;

        } catch (error) {
            textElement.innerText = "Erreur Groq : " + error.message;
            console.error("Détails :", error);
        } finally {
            loader.style.display = "none";
        }
    }

    async function corriger() {
      
        const type = document.getElementById('type').value;
        const theme = document.getElementById('theme').value;
        const serie = document.getElementById('serie').value;
        const textElement = document.getElementById('text');
        const loader = document.getElementById('loader');

        loader.style.display = "block";
        let tab = [textElement.textContent]

        const prompt = `Génère un corrigé clair pour l'exercice : ${tab[0]}.
            Donne uniquement les corrections sans commenter inutilement. Fais comme si tu étais un prof de français.`;
        
        textElement.innerText = "";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    // Modèle ultra-rapide de Meta via Groq
                    model: "llama-3.3-70b-versatile", 
                    messages: [{ role: "user", content: prompt }],
                    temperature: 0.8
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error.message);
            }

            const data = await response.json();
            textElement.innerText = data.choices[0].message.content;

        } catch (error) {
            textElement.innerText = "Erreur Groq : " + error.message;
            console.error("Détails :", error);
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
